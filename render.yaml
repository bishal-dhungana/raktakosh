services:
  - type: web
    name: raktakosh-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: TIDB_CA_CERT
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: CSRF_SECRET
        sync: false
      - key: MFA_ENCRYPTION_KEY
        sync: false
      - key: DOCUMENT_STORAGE_MODE
        value: r2
      - key: R2_BUCKET
        value: raktakosh
      - key: R2_ENDPOINT
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: DOCUMENT_SCAN_MODE
        value: clamav_local
      - key: DOCUMENT_RETENTION_DAYS
        value: "365"
      - key: AUTO_MIGRATE
        value: "false"
      - key: BOOTSTRAP_ADMIN_EMAIL
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_REVIEWER_EMAIL
        sync: false
      - key: BOOTSTRAP_REVIEWER_PASSWORD
        sync: false
      - key: BOOTSTRAP_INVENTORY_EMAIL
        sync: false
      - key: BOOTSTRAP_INVENTORY_PASSWORD
        sync: false
